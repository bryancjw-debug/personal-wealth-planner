function assetListRows(){const homes=(state.homes||[]).map(h=>{const loan=Number(h.loan)||0,value=Number(h.value)||0,mm=monthlyMortgage(h);return `<tr><td><strong>${h.label||"Property"}</strong><small>Housing</small></td><td>${money(value)}</td><td>${money(loan)}</td><td>${money(Math.max(0,value-loan))}</td><td>${money(mm)}/mo</td><td><button class="btn edit-record" data-edit-kind="home" data-id="${h.id}">Edit</button><button class="btn del-home" data-id="${h.id}">Delete</button></td></tr>`}),cars=(state.cars||[]).map(c=>{const loan=Number(c.loan)||0,value=Number(c.value)||0,mm=carMonthly(c);return `<tr><td><strong>${c.label||"Car"}</strong><small>Car</small></td><td>${money(value)}</td><td>${money(loan)}</td><td>${money(Math.max(0,value-loan))}</td><td>${money(mm)}/mo</td><td><button class="btn edit-record" data-edit-kind="car" data-id="${c.id}">Edit</button><button class="btn del-car" data-id="${c.id}">Delete</button></td></tr>`}),custom=(state.customAssets||[]).map(a=>{const liability=Number(a.liability)||0,value=Number(a.value)||0;return `<tr><td><strong>${a.label||"Other Asset"}</strong><small>Other</small></td><td>${money(value)}</td><td>${money(liability)}</td><td>${money(Math.max(0,value-liability))}</td><td>-</td><td><button class="btn edit-record" data-edit-kind="custom" data-id="${a.id}">Edit</button><button class="btn del-custom" data-id="${a.id}">Delete</button></td></tr>`});return [...homes,...cars,...custom]}
assetsStep=function(){const homes=state.homes||[],cars=state.cars||[],custom=state.customAssets||[],propertyValue=homes.reduce((t,h)=>t+(Number(h.value)||0),0),propertyDebt=homes.reduce((t,h)=>t+(Number(h.loan)||0),0),carValue=cars.reduce((t,c)=>t+(Number(c.value)||0),0),carDebt=cars.reduce((t,c)=>t+(Number(c.loan)||0),0),customValue=custom.reduce((t,a)=>t+(Number(a.value)||0),0),customDebt=custom.reduce((t,a)=>t+(Number(a.liability)||0),0),monthlyDebt=[...homes.map(h=>monthlyMortgage(h)),...cars.map(c=>carMonthly(c))].reduce((t,v)=>t+v,0);return `${sectionHead(5,stepTitle(5),"assets")}${uiSummaryGrid([{label:"Property Equity",value:money(Math.max(0,propertyValue-propertyDebt)),note:`${homes.length} properties`},{label:"Car Equity",value:money(Math.max(0,carValue-carDebt)),note:`${cars.length} cars`},{label:"Other Asset Equity",value:money(Math.max(0,customValue-customDebt)),note:`${custom.length} custom assets`},{label:"Monthly Debt",value:money(monthlyDebt),note:"Estimated loan payments"}])}<div class="eventbox record-panel"><div class="policy-toolbar"><h3>${icon("assets")}Assets & Liabilities</h3><button class="btn primary" id="addAssetRecord">Add Asset</button></div>${recordTable(["Asset","Value","Liability","Equity","Monthly Payment",""],assetListRows(),emptyState("No assets added yet","Add property, cars, or other assets when they are relevant to the projection.","Add Asset","emptyAddAsset"))}</div>${assetRecordModal()}`}

const annualContributionBeforeGlide=annualContribution;annualContribution=function(a,age){const base=annualContributionBeforeGlide(a,age);if(a.glideKey){const s=(state.shifts||[]).map(normalizeGlide).find(x=>a.glideKey===`glide-${x.id}-${a.type}`);if(!s||!s.futureContrib||age<Number(s.age||0))return base;const moved=Math.min(100,Math.max(0,Number(s.pct)||0))/100,target=glideTargets(s).find(t=>t.type===a.type),sourceContrib=glideSourceAssets(s).reduce((t,src)=>t+annualContributionBeforeGlide(src,age),0);return base+(sourceContrib*moved*((target?.pct||0)/100))}const reductions=(state.shifts||[]).map(normalizeGlide).filter(s=>s.futureContrib&&age>=Number(s.age||0)&&glideSourceAssets(s).some(src=>src.id===a.id)).reduce((t,s)=>Math.min(1,t+Math.min(100,Math.max(0,Number(s.pct)||0))/100),0);return base*Math.max(0,1-reductions)}
makeShift=function(){state.shifts=state.shifts||[];if(!normalInvestments().length)makeInvestment(false);const item={id:crypto.randomUUID(),label:"Retirement Glidepath",mode:"glidepath",scope:"all",age:Number(state.retirementAge)||Number(state.age)||60,pct:100,glideYears:0,futureContrib:true,targetAlloc:{...glideDefaultMix}};state.shifts.push(item);return item}

function shiftEditor(s){s=normalizeGlide(s);const sourceOptions=normalInvestments().map(a=>`<option value="${a.id}" ${a.id===s.from?"selected":""}>${a.label||a.type||"Investment"}</option>`).join("");const targetRows=glideTypes.map(type=>`<label>${type} Target %<input type="number" min="0" max="100" step="1" data-glide-target="${s.id}" data-type="${type}" value="${s.targetAlloc?.[type]??0}"></label>`).join("");const total=Object.values(s.targetAlloc||{}).reduce((t,v)=>t+(Number(v)||0),0);return guidedSection("Trigger","Choose when the portfolio should shift as retirement approaches.",`<label>Rule Name<input data-shift="${s.id}" data-k="label" value="${s.label||""}"></label><label>Re-Allocation Age<input type="number" data-shift="${s.id}" data-k="age" value="${s.age??""}"></label><label>Amount To Re-Allocate %<input type="number" min="0" max="100" step="1" data-shift="${s.id}" data-k="pct" value="${s.pct??100}"></label><label>Glidepath Duration (Years)<input type="number" min="0" step="1" data-shift="${s.id}" data-k="glideYears" value="${s.glideYears??0}"></label>`)+guidedSection("Source","Re-allocate either the whole investment portfolio or one specific higher-risk holding.",`<label>Re-Allocate From<select data-shift="${s.id}" data-k="scope"><option value="all" ${s.scope!=="selected"?"selected":""}>Entire Investment Portfolio</option><option value="selected" ${s.scope==="selected"?"selected":""}>Selected Investment Only</option></select></label><label class="${s.scope==="selected"?"":"disabled"}">Selected Investment<select data-shift="${s.id}" data-k="from">${sourceOptions}</select></label>${toggleField(`data-shift-check="${s.id}" data-k="futureContrib"`,"Future Contributions Follow This Allocation",!!s.futureContrib)}`)+guidedSection("Target Allocation","Enter the lower-risk mix you want after the shift. 100% re-allocation is allowed; target percentages are normalised if they do not add exactly to 100%.",targetRows+`<div class="glide-total ${Math.round(total)===100 investmentRecordModal=function(){const ed=getActiveEditor();if(!ed||!(ed.kind==="investment"||ed.kind==="shift"))return"";if(ed.kind==="shift"){const s=state.shifts.find(x=>x.id===ed.id);return s?modalShell("Edit Portfolio Glidepath","Investments",shiftEditor(s)):""}const a=state.assets.find(x=>x.id===ed.id);return a?modalShell(a.label||"Edit Investment","Investments",investmentEditor(a)):""}
investmentsStep=function(){const inv=normalInvestments(),total=inv.reduce((t,a)=>t+(Number(a.value)||0),0),annualContrib=inv.reduce((t,a)=>t+investmentContributionAnnual(a),0),dividend=inv.reduce((t,a)=>t+(a.divEnabled?(Number(a.value)||0)*(Number(a.divYield)||0)/100:0),0);return `${sectionHead(7,stepTitle(7),"invest")}${uiSummaryGrid([{label:"Total Invested",value:money(total),note:`${inv.length} holdings`},{label:"Annual Contributions",value:money(annualContrib),note:"Based on current age"},{label:"Weighted Return",value:weightedReturn().toFixed(1)+"%",note:"By current value"},{label:"Dividend Income",value:money(dividend),note:"Current-value estimate"}])}<div class="eventbox record-panel"><div class="policy-toolbar"><h3>${icon("invest")}Investment Holdings</h3><button class="btn primary" id="addInvestmentRecord">Add Investment</button></div>${recordTable(["Investment","Current Value","Contribution","Return","Dividend",""],investmentRows(),emptyState("No investments added yet","Add your first investment to include compounding, contributions, dividends, and drawdown rules.","Add Investment","emptyAddInvestment"))}</div><div class="eventbox record-panel"><div class="policy-toolbar"><h3>${icon("invest")}Portfolio Glidepath</h3><button class="btn" id="addShiftRecord">Add Glidepath</button></div>${recordTable(["Rule","Source","Target Allocation","Amount",""],shiftRows(),emptyState("No glidepaths yet","Add a retirement glidepath to shift from higher-risk assets into lower-risk assets near retirement.","Add Glidepath","emptyAddShift"))}</div>${investmentRecordModal()}`}
function keyMoment(point){const items=[];if((point.triggeredLifeEvents||[]).length)items.push(...point.triggeredLifeEvents.map(e=>e.label||e.type));if((state.shifts||[]).some(s=>Number(s.age)===point.age))items.push("Portfolio glidepath applied");if(point.annualDrawdown>0)items.push("Investment drawdown used");if(point.annualCpfDeficitDrawdown>0)items.push("CPF OA/SA deficit draw used");if(point.cpfLifeIncome>0)items.push("CPF LIFE payout received");if(point.annualSrsWithdrawal>0)items.push("SRS withdrawal received");return items}
dashboardView=function(rows,last,point){const p=point||rows[0]||last,prev=prevRow(rows,p),ret=rows.find(r=>r.age>=Number(state.retirementAge||65))||rows.at(-1),freeMonths=expenses()?((p?.freeCash||0)/expenses()):0,status=(p?.netCashFlow||0)>=0?"Surplus":"Deficit";return `${yearNav(rows,p)}<section class="grid metrics simplified-metrics">${metric("Net Worth",money(p?.totalAssets||0),`At Age ${p?.age||state.age}`,"good",deltaFor(p,prev,"totalAssets"))}${metric("Nett Cash Flow",money(p?.netCashFlow||0),status,(p?.netCashFlow||0)>=0?"flow-good":"flow-bad",deltaFor(p,prev,"netCashFlow"))}${metric("Free Cash Runway",freeMonths.toFixed(1)+" Months","Based on current monthly expenses","",deltaBadge(prev&&expenses()?freeMonths-((prev.freeCash||0)/expenses()):0))}${metric((ret?.netCashFlow||0)>=0?"Retirement Surplus":"Retirement Deficit",money(Math.abs(ret?.netCashFlow||0)),`At Age ${ret?.age||"-"}`,(ret?.netCashFlow||0)>=0?"flow-good":"flow-bad")}</section><div class="step-jump open">${stepLabels.map((l,i)=>`<button class="btn" data-edit-step="${i+1}">${i+1}. ${l[0]}</button>`).join("")}</div>${projectionChartView(rows)}${snapshotOpen&&p?snapshotModal(rows,p,prev):""}`}
snapshot=function(point,prev){const totalIncome=(point.activeIncome||0)+(point.annualDividendIncome||0)+(point.cpfLifeIncome||0)+(point.annualSrsWithdrawal||0),assetEquity=(point.housingEquity||0)+(point.carEquity||0)+(point.customEquity||0),moments=keyMoment(point);const summaryCards=snapCard('Net Worth',money(point.totalAssets),'total',deltaFor(point,prev,'totalAssets'))+snapCard('Nett Cash Flow',money(point.netCashFlow),point.netCashFlow>=0?'flow-good':'flow-bad',deltaFor(point,prev,'netCashFlow'))+snapCard('Total Income',money(totalIncome),'',deltaBadge(totalIncome-((prev?.activeIncome||0)+(prev?.annualDividendIncome||0)+(prev?.cpfLifeIncome||0)+(prev?.annualSrsWithdrawal||0))))+snapCard('Total Outflow',money(point.annualCashOutflows),'',deltaFor(point,prev,'annualCashOutflows'))+(point.annualDrawdown>0?snapCard('Drawdown Used',money(point.annualDrawdown),'flow-bad',deltaFor(point,prev,'annualDrawdown')):"")+(point.annualCpfDeficitDrawdown>0?snapCard('CPF Deficit Draw',money(point.annualCpfDeficitDrawdown),'flow-bad',deltaFor(point,prev,'annualCpfDeficitDrawdown')):"");const incomeRows=[snapRow('Gross Active Income',money(point.activeIncome||0)),snapRow('CPF LIFE Income',money(point.cpfLifeIncome||0)),snapRow('Dividend Income',money(point.annualDividendIncome||0)),snapRow('SRS Withdrawal',money(point.annualSrsWithdrawal||0))];const outflowRows=[snapRow('Living Expenses',money(point.annualExpenses||0)),snapRow('Estimated Income Tax',money(point.annualIncomeTax||0)),snapRow('Insurance Premiums',money(point.annualInsurancePremiums||0)),snapRow('CareShield From MediSave',money(point.annualCareShieldPremiums||0)),snapRow('Employee CPF Contribution',money(point.employeeCpfContribution||0)),snapRow('SRS Contribution',money(point.annualSrsContribution||0)),snapRow('Life Events',money(point.annualLifeEventCosts||0)),snapRow('Investment Contributions',money(point.annualInvestmentContributions||0)),snapRow('Mortgage From Cash',money(point.annualMortgageCash||0)),snapRow('M const bindBeforeGlidepath=bind;bind=function(rows){bindBeforeGlidepath(rows);document.querySelectorAll(".record-modal").forEach(m=>{if(m.parentElement!==document.body)document.body.appendChild(m)});document.querySelectorAll("[data-glide-target]").forEach(el=>el.oninput=e=>{const s=state.shifts.find(x=>x.id===e.target.dataset.glideTarget);if(s){normalizeGlide(s);s.targetAlloc[e.target.dataset.type]=e.target.value===""?0:Number(e.target.value);localStorage.setItem(store,JSON.stringify(state))}});document.querySelectorAll("[data-shift]").forEach(el=>el.onchange=e=>{const s=state.shifts.find(x=>x.id===e.target.dataset.shift);if(s){const k=e.target.dataset.k,val=e.target.type==="number"?(e.target.value===""?"":Number(e.target.value)):e.target.value;s[k]=val;if(k==="scope"&&val==="selected"&&!s.from)s.from=normalInvestments()[0]?.id;normalizeGlide(s);localStorage.setItem(store,JSON.stringify(state));render()}});document.querySelectorAll("[data-shift-check]").forEach(el=>el.onchange=e=>{const s=state.shifts.find(x=>x.id===e.target.dataset.shiftCheck);if(s){s[e.target.dataset.k]=e.target.checked;localStorage.setItem(store,JSON.stringify(state))}});document.querySelectorAll(".glide-preset").forEach(b=>b.onclick=e=>{const s=state.shifts.find(x=>x.id===e.currentTarget.dataset.id);if(!s)return;const mixes={balanced:{"Equities":30,"Funds / ETFs":30,"Bonds":30,"Cash holdings":10},income:{"Funds / ETFs":20,"Bonds":55,"Cash holdings":15,"Endowments":10},capital:{"Bonds":60,"Cash holdings":25,"Endowments":15}};s.targetAlloc={...Object.fromEntries(glideTypes.map(t=>[t,0])),...(mixes[e.currentTarget.dataset.mix]||glideDefaultMix)};localStorage.setItem(store,JSON.stringify(state));render()})}
