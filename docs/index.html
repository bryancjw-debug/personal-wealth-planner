document.head.insertAdjacentHTML("beforeend",`<style>.ui-switch{width:38px!important;height:22px!important;min-width:38px!important;border-radius:999px!important}.ui-switch:after{width:16px!important;height:16px!important;left:2px!important;top:2px!important}.ui-switch.on:after{transform:translateX(16px)!important}.switch-row{gap:9px!important;align-items:center!important}.coverage-box .switch-row,.policy-card .switch-row{min-height:38px!important}.coverage-toggle,.policy-toggle{min-height:38px!important;padding:4px 0!important}.toggle{display:inline-flex!important;align-items:center!important;gap:9px!important;min-height:34px!important;padding:6px 10px!important;border-radius:999px!important;line-height:1.1!important}.toggle span{width:38px!important;height:22px!important;min-width:38px!important;border-radius:999px!important}.toggle span:after{width:16px!important;height:16px!important;left:2px!important;top:2px!important}.toggle input:checked+span:after{transform:translateX(16px)!important}.toggle b{font-size:.82rem!important;white-space:normal!important}</style>`);
function hasCoverage(p,type){return !!(p&&p.coverages&&Object.prototype.hasOwnProperty.call(p.coverages,type))}
coverageBox=function(p,type){const on=hasCoverage(p,type);return `<div class="coverage-box"><button type="button" class="switch-row coverage-toggle" data-coverage-toggle="${type}" data-policy="${p.id}">${switchEl(on)}<b>${type}</b></button>${on?`<label>Sum Assured<input type="number" data-policy="${p.id}" data-coverage="${type}" value="${p.coverages[type]??""}"></label>`:""}</div>`}
if(!window.__wealthToggleDelegate){window.__wealthToggleDelegate=true;document.addEventListener("click",e=>{const cov=e.target.closest?.("[data-coverage-toggle]"),pol=e.target.closest?.("[data-pol-check]");if(!cov&&!pol)return;e.preventDefault();e.stopPropagation();e.stopImmediatePropagation();if(cov){const p=state.policies.find(x=>x.id===cov.dataset.policy),k=cov.dataset.coverageToggle;if(p&&k){p.coverages=p.coverages||{};if(hasCoverage(p,k))delete p.coverages[k];else p.coverages[k]="";render()}return}if(pol){const p=state.policies.find(x=>x.id===pol.dataset.policy),k=pol.dataset.polCheck;if(p&&k){p[k]=!p[k];render()}}},true)}
// Live projection summary and final step naming.
stepLabels[2][0]="Expenses & Emergency Cash";stepLabels[3][0]="Protection Portfolio";stepLabels[4][0]="Assets & Liabilities";
document.head.insertAdjacentHTML("beforeend",`<style>.wizard.panel{grid-template-columns:260px minmax(0,1fr) minmax(280px,330px)!important;align-items:start}.wizard .page{min-width:0}.live-summary{grid-column:3;grid-row:1;position:sticky;top:88px;border:1px solid color-mix(in srgb,var(--primary) 24%,var(--line));border-radius:18px;background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 94%,transparent),color-mix(in srgb,var(--soft) 94%,transparent));box-shadow:0 20px 54px rgba(2,6,23,.14);padding:16px;overflow:hidden}.live-summary:before{content:"";position:absolute;inset:0 0 auto 0;height:4px;background:linear-gradient(90deg,#38bdf8,#2dd4bf,#f6c85f)}.live-summary p{margin:0 0 4px}.live-summary h3{margin:0 0 14px;font-size:1.12rem}.live-summary-grid{display:grid;gap:10px}.live-chip{display:grid;gap:4px;padding:11px 12px;border:1px solid var(--line);border-radius:14px;background:color-mix(in srgb,var(--panel) 72%,transparent)}.live-chip span{color:var(--muted);font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.live-chip strong{font-size:1.1rem;line-height:1.1;color:var(--text);font-variant-numeric:tabular-nums}.live-chip.net strong,.live-chip.cpf strong{color:#38bdf8}.live-chip.cash strong{color:#2dd4bf}.live-chip.outflow strong{color:#f06b68}.live-chip.retire.good strong{color:#31c6a6}.live-chip.retire.bad strong{color:#f06b68}.live-summary small{display:block;margin-top:12px;color:var(--muted);line-height:1.4}.wizard-actions{grid-column:2 / 4!important}@media(max-width:1100px){.wizard.panel{grid-template-columns:1fr!important}.live-summary{grid-column:1;grid-row:auto;position:relative;top:auto}.wizard-actions{grid-column:1!important}}@media(max-width:680px){main{padding-bottom:160px}.live-summary{position:fixed;left:10px;right:10px;bottom:10px;z-index:60;padding:12px;border-radius:18px;box-shadow:0 20px 70px rgba(2,6,23,.28);backdrop-filter:blur(18px)}.live-summary h3{display:none}.live-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.live-chip{padding:8px 9px;border-radius:12px}.live-chip span{font-size:.62rem}.live-chip strong{font-size:.92rem}.live-summary small{display:none}}</style>`);
function liveSummaryData(){const rows=project(),current=rows.find(r=>r.age===(Number(state.age)||0))||rows[0]||{},retAge=Number(state.retirementAge)||65,ret=rows.find(r=>r.age>=retAge)||rows.at(-1)||current,months=(Number(state.freeCash)||0)/Math.max(1,expenses()),retFlow=Number(ret.netCashFlow)||0;return{current,ret,months,retFlow}}
function liveChip(cls,label,value){return `<div class="live-chip ${cls}"><span>${label}</span><strong>${value}</strong></div>`}
function liveSummaryMarkup(){const d=liveSummaryData(),retLabel=d.retFlow>=0?"Retirement Surplus":"Retirement Deficit";return `<aside class="live-summary" id="liveSummary"><p class="eyebrow">Live Summary</p><h3>Projection Pulse</h3><div class="live-summary-grid">${liveChip("net","Net Worth",money(d.current.totalAssets||0))}${liveChip("outflow","Annual Outflow",money(d.current.annualCashOutflows||0))}${liveChip("cpf","CPF Total",money(d.current.cpfTotal||0))}${liveChip("cash","Free Cash Months",d.months.toFixed(1)+" Months")}${liveChip("retire "+(d.retFlow>=0?"good":"bad"),retLabel,money(Math.abs(d.retFlow)))}</div><small>Updates as you enter figures, so you can catch cash-flow pressure before reaching the projection page.</small></aside>`}
const wizardBeforeLiveSummary=wizard;wizard=function(){return wizardBeforeLiveSummary().replace('<div class="wizard-actions">',liveSummaryMarkup()+'<div class="wizard-actions">').replace('Add Monthly Expenses And Emergency Cash','Add Expenses & Emergency Cash').replace('Review Insurance Protection','Build Protection Portfolio').replace('Add Assets And Liabilities','Add Assets & Liabilities')}
function refreshLiveSummary(){const slot=document.getElementById("liveSummary");if(slot)slot.outerHTML=liveSummaryMarkup()}
const commitInputBeforeLiveSummary=commitInput;commitInput=function(el){commitInputBeforeLiveSummary(el);refreshLiveSummary()}
render();
