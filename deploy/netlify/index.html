nualDrawdown>0?`<rect x="${gx+(bw+1)*6}" y="${zero}" width="${bw}" height="${scale(-r.annualDrawdown)-zero}" rx="2" fill="#a855f7" data-age="${r.age}"/>`:""}`}).join("")}<polyline fill="none" stroke="var(--chartline)" stroke-width="2.5" points="${points}"/>${rows.map((r,i)=>`<circle cx="${x(i)+bw*2.8}" cy="${scale(r.totalAssets)}" r="5" fill="var(--panel)" stroke="var(--chartline)" stroke-width="2" data-age="${r.age}"/>`).join("")}</svg><div id="chartTip" class="chart-tooltip"></div></div>`}function themeIcon(){return `<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21h6M10 17h4M8.2 14.2c-1.4-1.1-2.2-2.8-2.2-4.7A6 6 0 0 1 18 9.5c0 1.9-.9 3.6-2.2 4.7-.7.6-1.1 1.3-1.2 2.1H9.4c-.1-.8-.5-1.5-1.2-2.1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 3V2M4.9 5.6l-.7-.7M19.1 5.6l.7-.7M3 10H2M22 10h-1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`}function render(){document.querySelectorAll("body > #chartTip").forEach(t=>t.remove());const rows=project(),last=rows.at(-1),point=rows.find(r=>r.age===selected)||rows[0];document.documentElement.dataset.theme=state.dark?"dark":"light";app.innerHTML=`<header class="hero"><div><p class="eyebrow">Guided wealth projection</p><h1>Map your assets from today to tomorrow</h1><p>Key in your details, add income and expenses, then enter your investment portfolio to see projected investment value plus free cash after expenses by age.</p></div><div class="actions"><select id="profileSelect" class="profile-select" title="Saved profiles">${profileOptions()}</select><button class="btn" id="load">Load</button><button class="btn" id="save">Save</button><button class="btn" id="reset">Reset</button><button class="btn theme-toggle" id="theme" title="Toggle theme">${themeIcon()}</button></div></header>${expenses()>income()?'<div class="warn">Expenses are higher than income, so free cash will not grow.</div>':""}${!dashboa function assetAddControl(){return `<div class="asset-add"><label>Asset category<select id="assetTypeToAdd"><option>Housing</option><option>Car</option><option>Other</option></select></label><button class="btn primary" id="addRealAsset">Add asset</button></div>`}
function assetsStep(){return `<p class="eyebrow">Step 5</p><h2>Add assets and liabilities</h2><div class="eventbox assets-panel"><h3>Assets</h3>${freeCashCard()}${(state.homes||[]).map(homeRow).join("")}${(state.cars||[]).map(carRow).join("")}${(state.customAssets||[]).map(customAssetRow).join("")}${assetAddControl()}<p class="cpfnote">Choose Housing, Car, or Other from one add control. Housing remains green, cars amber, and other assets grey so the projection stays visually consistent.</p></div>`}
function wizard(){const labels=["Profile","Income & CPF","Expenses","Investments","Assets","Life events"];return `<section class="wizard panel"><div class="rail">${labels.map((l,i)=>`<button class="${step===i+1?"active":""}" data-step="${i+1}"><span>${i+1}</span>${l}</button>`).join("")}</div><div class="page">${step===1?`<p class="eyebrow">Step 1</p><h2>Tell us who this projection is for</h2><div class="grid form"><label>Name<input data-top="name" value="${state.name}"></label><label>Current age<input type="number" data-top="age" value="${state.age}"></label><label>Project until age<input type="number" data-top="endAge" value="${state.endAge}"></label><label>Income growth / inflation %<input type="number" data-top="incomeInf" value="${state.incomeInf}"></label><label>Expense inflation %<input type="number" data-top="expenseInf" value="${state.expenseInf}"></label></div>`:""}${step===2?`<p class="eyebrow">Step 2</p><h2>Add income and CPF settings</h2><div class="grid cashgrid">${cashCard("Monthly income","income","incomeMode","monthlyIncome")}</div>${cpfCard()}`:""}${step===3?`<p class="eyebrow">Step 3</p><h2>Add monthly expenses</h2><div class="grid cashgrid">${cashCard("Monthly expenses","expenses","expenseMode","monthlyExpenses")}</div><p class="cpfnote">Assets and liabilities now live in Step 5 so expenses stay focused on recurring spending.</p>`:""}${step===4?`<p class="eyebrow">Step 4</p><h2>Add investment portfolio</h2><button class="btn primary" id="addAsset">Add investment</button><div style="margin-top:12px">${state.assets.map(asset).join("")}</div><div class="eventbox"><h3>Asset allocation changes</h3>${state.assets.length<2?`<p class="cpfnote">Add shift will create a zero-value target asset automatically, then move the selected percentage into it at the chosen age.</p>`:(state.shifts||[]).map(shiftRow).join("")}<button class="btn" id="addShift">Add shift</button></div>`:""}${step===5?assetsStep():""}${step===6?`<p class="eyebrow">Step 6</p><h2>Add life events and cash-flow changes</h2><div class="eventbox"><h3>Income, expenses, and one-off events</h3>${(state.events||[]).map(eventRow).join("")}<button class="btn" id="addEvent">Add event</button><p class="cpfnote">Use this for retirement, car purchases, property upgrades, weddings, income drops, income increases, or expense changes at a specific age.</p></div>`:""}</div><div class="wizard-actions"><button class="btn" id="back" ${step===1?"disabled":""}>Back</button><button class="btn" id="viewDash">View projection</button>${step<6?'<button class="btn primary" id="next">Next</button>':'<button class="btn primary" id="build">Build wealth chart</button>'}</div></section>`}function dashboardView(rows,last,point){const overview=state.viewMode!=="detailed",p=point||rows[0]||last;return `<section class="grid metrics">${metric("Projected assets",money(p?.totalAssets||0),`At age ${p?.age||state.age}`,"good")}${metric("Projected investments",money(p?.investmentValue||0),"Current portfolio compounded")}${metric("Asset equity",money((p?.investmentValue||0)+(p?.housingEquity||0)+(p?.carEquity||0)+(p?.customEquity||0)),"Investments plus assets less related loans")}${metric("Accumulated free cash",money(p?.freeCash||0),"Excess cash after expenses")}</section><button class="btn mobile-jump-toggle" id="mobileJumpToggle">${mobileNavOpen?"Hide input shortcuts":"Jump to inputs"}</button><div class="step-jump ${mobileNavOpen?"open":""}">${["Profile","Income & CPF","Expenses","Investments","Assets","Life events"].map((l,i)=>`<button class="btn" data-edit-step="${i+1}">${i+1}. ${l}</button>`).join("")}</div><div class="dash-actions"><div class="view-toggle"><button class="${overview?"active":""}" data-view="overview">Overview</button><button class="${!overview?"active":""}" data-view="detailed">Detailed</button></div><button class="btn" id="edit">Edit inputs</button></div>${overview?overviewView(rows,last,point):detailedView(rows,last,point)}`}
function overviewView(rows,last,point){const p=point||rows[0],equity=(p?.investmentValue||0)+(p?.housingEquity||0)+(p?.carEquity||0)+(p?.customEquity||0),netClass=(p?.netCashFlow||0)>=0?"net":"net negative";return `<section class="overview-hero overview-summary"><div class="focus-card"><span>Projected net worth</span><strong>${money(p?.totalAssets||0)}</strong><small class="hint">Selected age ${p?.age||state.age}. Click any point on the chart to refresh these headline figures.</small></div><div class="quick-grid"><div class="mini-card income"><span>Annual income at selected age</span><strong>${money((p?.annualIncome||0)+(p?.annualDividendIncome||0))}</strong></div><div class="mini-card outflow"><span>Annual outflow at selected age</span><strong>${money(p?.annualCashOutflows||0)}</strong></div><div class="mini-card ${netClass}"><span>Nett cash flow</span><strong>${money(p?.netCashFlow||0)}</strong></div><div class="mini-card cpf"><span>CPF total</span><strong>${money(p?.cpfTotal||0)}</strong></div><div class="mini-card cash"><span>Free cash</span><strong>${money(p?.freeCash||0)}</strong></div><div class="mini-card equity"><span>Total asset equity</span><strong>${money(equity)}</strong><small class="hint">Includes investments</small></div></div></section><section class="panel chart"><p class="eyebrow">Overview</p><h2>Assets, income, and outflows by age</h2><div class="legend"><span><i style="background:#2563eb"></i>Investment value</span><span><i style="background:#0f766e"></i>Housing equity</span><span><i style="background:#d97706"></i>Car equity</span><span><i style="background:#059669"></i>Income</span><span><i style="background:#dc2626"></i>Outflows</span><span><i style="background:#f97316"></i>Deficit</span></div>${chart(rows)}<p class="hint">Click any age marker to refresh the overview numbers. Use Detailed for the full Year Snapshot and asset allocation pie.</p></section>`}
function detailedView(rows,last,point){return `<section class="panel chart"><p class="eyebrow">Detailed projection</p><h2>Income, expenses, and assets by age</h2><div class="legend"><span><i style="background:#2563eb"></i>Investment value</span><span><i style="background:#0f766e"></i>Housing equity</span><span><i style="background:#d97706"></i>Car equity</span><span><i style="background:#059669"></i>Active + CPF LIFE income</span><span><i style="background:#dc2626"></i>Expenses + contributions + loans</span><span><i style="background:#f97316"></i>Cash deficit</span><span><i style="background:#a855f7"></i>Investment drawdown</span><span><i style="background:var(--chartline)"></i>Total assets line</span></div>${chart(rows)}<p class="hint">Hover a year for a compact pop-up. Click a year to update the full year snapshot below.</p><p class="hint">Red bars include expenses, life-event costs, planned investment contributions, CPF OA mortgage usage, cash mortgage payments, and car loan payments. If nett cash flow is negative, enabled investments are drawn down.</p></section>${point?snapshot(point):""}`}function metricBox(l,v){return `<div><span>${l}</span><strong>${v}</strong></div>`}
function snapshot(point){const incomeCard=(point.annualDividendIncome||0)>0?snapCard("Dividend income",money(point.annualDividendIncome)):(point.cpfLifeIncome||0)>0?snapCard("CPF LIFE payout",money(point.cpfLifeIncome)):snapCard("Active income",money(point.activeIncome||0));return `<section class="snapshot-panel"><div class="snapshot-plane"><div><p class="eyebrow">Year snapshot</p><h3>Age ${point.age}</h3><div class="snap-grid">${snapCard("Total assets",money(point.totalAssets),"total")}${snapCard("Investment holdings",money(point.investmentValue))}${snapCard("Property equity",money(point.housingEquity||0))}${snapCard("Car equity",money(point.carEquity||0))}${snapCard("Other asset equity",money(point.customEquity||0))}${snapCard("CPF total",money(point.cpfTotal||0))}${snapCard("Free cash",money(point.freeCash))}${incomeCard}${snapCard("Total income",money(point.annualIncome+point.annualDividendIncome))}${snapCard("Total outflow",money(point.annualCashOutflows))}${snapCard("Nett cash flow",money(point.netCashFlow),point.netCashFlow>=0?"flow-good":"flow-bad")}</div><div class="snap-cols"><div class="snap-section"><h4>Income</h4><div class="snap-list">${snapRow("Active income",money(point.activeIncome||0))}${snapRow("CPF LIFE income",money(point.cpfLifeIncome||0))}${snapRow("Dividend income",money(point.annualDividendIncome))}</div></div><div class="snap-section"><h4>Outflows</h4><div class="snap-list">${snapRow("Living expenses",money(point.annualExpenses))}${snapRow("Life events",money(point.annualLifeEventCosts))}${snapRow("Investment contributions",money(point.annualInvestmentContributions))}${snapRow("Mortgage from cash",money(point.annualMortgageCash||0))}${snapRow("Mortgage from CPF OA",money(point.annualMortgageCpf||0))}${snapRow("Car loan payments",money(point.annualCarLoanCash||0))}${snapRow("Car running expenses",money(point.annualCarExpenses||0))}${snapRow("Investment drawdown",money(point.annualDrawdown))}${snapRow("CPF OA/SA deficit draw",money(point.annualCpfDeficitDrawdown||0))}</div></div><div class="snap-section"><h4>CPF balances</h4><div class="snap-list">${snapRow("Ordinary Account",money(point.cpf?.oa||0))}${snapRow("Special Account",money(point.cpf?.sa||0))}${snapRow("Retirement Account",money(point.cpf?.ra||0))}${snapRow("MediSave Account",money(point.cpf?.ma||0))}${snapRow("CPF LIFE premium base",money(point.cpfLifeBase||0))}</div></div></div><div class="snap-cols"><div class="snap-section"><h4>Investment holdings</h4><div class="snap-list">${point.assets.map(a=>snapRow(a.label,money(a.projected))).join("")||snapRow("No investments",money(0))}</div></div><div class="snap-section"><h4>Property and cars</h4><div class="snap-list">${(point.homes||[]).map(h=>snapRow(`${h.label} equity`,`${money(h.equity)} (${money(h.projected)} value)`)).join("")}${(point.cars||[]).map(c=>snapRow(`${c.label} equity`,`${money(c.equity)} (${money(c.projected)} value)`)).join("")}${(point.customAssets||[]).map(a=>snapRow(`${a.label} equity`,`${money(a.equity)} (${money(a.projected)} value)`)).join("")||""}</div></div><div class="snap-section"><h4>Events</h4><div class="snap-list">${(point.triggeredLifeEvents||[]).length?(point.triggeredLifeEvents||[]).map(e=>snapRow(e.label,`${e.type||"Custom"} ${money(e.cost||0)}`)).join(""):snapRow("Life events", "None triggered")}</div></div></div></div>${assetPie(point)}</div></section>`}
function assetPie(point){const slices=[{label:"Investments",value:point.investmentValue,color:"#2563eb"},{label:"Property equity",value:point.housingEquity||0,color:"#0f766e"},{label:"Car equity",value:point.carEquity||0,color:"#d97706"},{label:"CPF OA",value:point.cpf?.oa||0,color:"#60a5fa"},{label:"CPF SA",value:point.cpf?.sa||0,color:"#7c3aed"},{label:"CPF RA",value:point.cpf?.ra||0,color:"#f59e0b"},{label:"CPF MA",value:point.cpf?.ma||0,color:"#14b8a6"},{label:"Other assets",value:point.customEquity||0,color:"#94a3b8"},{label:"Free cash",value:point.freeCash||0,color:"#64748b"}].filter(s=>s.value>0),total=slices.reduce((t,s)=>t+s.value,0)||1;let acc=0;const r=88,c=110;function arc(start,end){const a1=(start/total)*Math.PI*2-Math.PI/2,a2=(end/total)*Math.PI*2-Math.PI/2,x1=c+r*Math.cos(a1),y1=c+r*Math.sin(a1),x2=c+r*Math.cos(a2),y2=c+r*Math.sin(a2),large=end-start>total/2?1:0;return `M ${c} ${c} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`}const paths=slices.map(s=>{const start=acc;acc+=s.value;return `<path d="${arc(start,acc)}" fill="${s.color}" data-pie="${s.label}: ${money(s.value)}"><title>${s.label}: ${money(s.value)}</title></path>`}).join("");return `<aside class="pie-card"><p class="eyebrow">Asset allocation</p><h3>Age ${point.age}</h3><svg viewBox="0 0 220 220" role="img" aria-label="Asset allocation pie chart">${paths}<circle cx="110" cy="110" r="45" fill="var(--panel)"/><text x="110" y="106" text-anchor="middle" class="tick">Total</text><text x="110" y="126" text-anchor="middle" fill="var(--text)" font-size="16" font-weight="900">${money(point.totalAssets)}</text></svg><p class="cpfnote">Hover a slice to see its value.</p></aside>`}function snapCard(l,v,c=""){return `<div class="snap-card ${c}"><span>${l}</span><strong>${v}</strong></div>`}
function snapRow(l,v){return `<div class="snap-row"><span>${l}</span><strong>${v}</strong></div>`}
